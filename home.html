        *{

}

.carousel{
    width:100%;
    height: 450px;
    /* margin:50px auto; */
    position:relative;
    overflow:hidden;
}

.slide{
    width:100%;
    height:100%;
    position:absolute;
    display:none;
}

.slide.active{
    display:block;
}

.prev,.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    padding:10px 15px;
    font-size:20px;
    cursor:pointer;
    background:white;
    border:none;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}
